<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loading Product... | Discount Hub</title>
    
    <!-- SEO Meta Tags (Will be updated dynamically) -->
    <meta name="description" content="Shop premium products at Discount Hub.">
    <meta property="og:title" content="Discount Hub Product">
    <meta property="og:description" content="Shop premium products at Discount Hub.">
    <meta property="og:image" content="">
    <meta property="og:type" content="product">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Default Dark Theme */
            --primary-color: #6c63ff;
            --secondary-color: #121116;
            --bg-color: #0b0b0f;
            --surface-color: #1a1a20;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-color: #00e5ff;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --border-color: rgba(255,255,255,0.1);
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --card-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Light Theme Overrides */
        [data-theme="light"] {
            --bg-color: #f4f4f6;
            --surface-color: #ffffff;
            --text-primary: #121116;
            --text-secondary: #666666;
            --border-color: rgba(0,0,0,0.1);
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
            --card-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text-primary); line-height: 1.6; padding-bottom: 80px; transition: background-color 0.3s, color 0.3s; }
        
        a { text-decoration: none; color: inherit; transition: 0.3s; }
        ul { list-style: none; }
        button { cursor: pointer; border: none; font-family: inherit; }

        /* --- Layout --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .page-header { padding: 15px 0; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
        .logo span { color: var(--primary-color); }
        
        /* Theme Switcher */
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .theme-toggle { background: none; color: var(--text-primary); font-size: 1.2rem; }

        /* --- Skeletons --- */
        .skeleton { background: linear-gradient(90deg, var(--surface-color) 25%, var(--bg-color) 50%, var(--surface-color) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-text { height: 1em; margin-bottom: 0.5em; width: 80%; }
        .skeleton-box { width: 100%; height: 300px; }

        /* --- Product Grid --- */
        .product-wrapper { display: flex; flex-direction: column; gap: 30px; margin-top: 30px; }
        @media(min-width: 768px) {
            .product-wrapper { flex-direction: row; align-items: flex-start; }
            .gallery-section { flex: 1; position: sticky; top: 20px; }
            .details-section { flex: 1; }
        }

        /* --- Gallery --- */
        .gallery-container { position: relative; overflow: hidden; border-radius: var(--radius); background: var(--surface-color); aspect-ratio: 1/1; box-shadow: var(--shadow); }
        .slides-track { display: flex; transition: transform 0.4s ease-out; height: 100%; }
        .slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: contain; }
        .gallery-nav { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; }
        .thumb { width: 60px; height: 60px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; object-fit: cover; background: var(--surface-color); }
        .thumb.active { border-color: var(--primary-color); }
        .slide-dots { position: absolute; bottom: 15px; left: 0; right: 0; display: flex; justify-content: center; gap: 8px; z-index: 2; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); }
        .dot.active { background: var(--primary-color); transform: scale(1.2); }

        /* --- Details --- */
        .product-title { font-size: 1.8rem; font-weight: 600; margin-bottom: 10px; line-height: 1.2; }
        .rating-badge { display: inline-flex; align-items: center; background: rgba(255,193,7,0.15); color: var(--warning-color); padding: 4px 8px; border-radius: 4px; font-size: 0.9rem; font-weight: 600; margin-bottom: 15px; }
        .rating-badge i { margin-right: 5px; }
        .rating-count { color: var(--text-secondary); font-size: 0.8rem; margin-left: 5px; font-weight: 400; }

        .price-block { margin-bottom: 20px; background: var(--surface-color); padding: 15px; border-radius: var(--radius); border: 1px solid var(--border-color); position: relative; overflow: hidden; }
        .current-price { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
        .mrp { text-decoration: line-through; color: var(--text-secondary); margin-left: 10px; }
        .discount-tag { background: var(--success-color); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.85rem; margin-left: 10px; vertical-align: middle; }
        .cod-badge { display: inline-flex; align-items: center; font-size: 0.8rem; color: var(--success-color); margin-top: 8px; font-weight: 500; }
        .cod-badge i { margin-right: 5px; }

        /* --- Featured Timer Styles --- */
        .featured-timer-box { background: linear-gradient(90deg, rgba(108, 99, 255, 0.1), rgba(0, 229, 255, 0.1)); padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--primary-color); display: flex; align-items: center; justify-content: space-between; }
        .timer-label { font-size: 0.9rem; font-weight: 600; color: var(--primary-color); }
        .timer-display { font-family: monospace; font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }
        .limited-deal-tag { position: absolute; top: 0; right: 0; background: var(--danger-color); color: white; padding: 2px 8px; font-size: 0.7rem; border-bottom-left-radius: 8px; text-transform: uppercase; font-weight: 700; }

        /* --- Actions --- */
        .action-area { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .qty-selector { display: flex; align-items: center; background: var(--surface-color); width: fit-content; border-radius: 8px; padding: 5px; border: 1px solid var(--border-color); margin-bottom: 10px; }
        .qty-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 4px; color: var(--text-primary); font-size: 1.1rem; }
        [data-theme="light"] .qty-btn { background: rgba(0,0,0,0.05); }
        .qty-input { width: 40px; text-align: center; background: transparent; border: none; color: var(--text-primary); font-weight: 600; }
        
        .btn { padding: 14px 20px; border-radius: 50px; font-weight: 600; font-size: 1rem; transition: transform 0.2s; width: 100%; text-align: center; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(45deg, var(--primary-color), var(--accent-color)); color: white; box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4); }
        .btn-secondary { background: transparent; border: 2px solid var(--primary-color); color: var(--text-primary); }
        .btn-disabled { background: var(--surface-color); color: var(--text-secondary); cursor: not-allowed; border: 1px solid var(--border-color); box-shadow: none; }

        /* --- Pincode --- */
        .pincode-box { background: var(--surface-color); padding: 15px; border-radius: var(--radius); margin-bottom: 25px; }
        .pincode-input-group { display: flex; gap: 10px; margin-top: 10px; }
        .pincode-input-group input { flex: 1; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-primary); padding: 10px; border-radius: 6px; outline: none; }
        .check-btn { background: var(--text-secondary); color: var(--bg-color); padding: 0 15px; border-radius: 6px; font-weight: 600; }
        .pincode-msg { font-size: 0.85rem; margin-top: 8px; }
        .pincode-msg.success { color: var(--success-color); }
        .pincode-msg.error { color: var(--danger-color); }

        /* --- Features & Specs --- */
        .info-card { background: var(--surface-color); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: var(--card-shadow); }
        .info-card h3 { font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px; color: var(--text-primary); }
        .feature-list li { margin-bottom: 8px; padding-left: 20px; position: relative; font-size: 0.9rem; color: var(--text-secondary); }
        .feature-list li::before { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--primary-color); position: absolute; left: 0; }
        
        .specs-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .specs-table tr { border-bottom: 1px solid var(--border-color); }
        .specs-table td { padding: 10px 0; }
        .specs-table td:first-child { color: var(--text-secondary); width: 40%; }
        .specs-table td:last-child { color: var(--text-primary); font-weight: 500; }

        /* --- Updated Premium Reviews --- */
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .write-review-btn { display: none; } /* Hidden by default for read-only mode */
        
        .premium-reviews-grid { display: flex; flex-direction: column; gap: 15px; }
        @media(min-width: 768px) { .premium-reviews-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; } }

        .review-card { background: var(--bg-color); border-radius: 12px; padding: 15px; border: 1px solid var(--border-color); transition: transform 0.2s; }
        .review-card:hover { transform: translateY(-3px); border-color: var(--primary-color); }
        .reviewer-meta { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; align-items: center; }
        .reviewer-profile { display: flex; align-items: center; gap: 10px; }
        .reviewer-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--primary-color); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 12px; }
        .reviewer-name { font-weight: 600; color: var(--text-primary); }
        .review-date { color: var(--text-secondary); font-size: 0.75rem; }
        .review-stars { color: var(--warning-color); font-size: 0.8rem; margin-bottom: 8px; }
        .review-text { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; margin-bottom: 10px; }
        .review-images { display: flex; gap: 8px; margin-top: 5px; }
        .review-img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid var(--border-color); }
        .load-more-btn { margin: 20px auto; display: block; background: transparent; border: 1px solid var(--text-secondary); color: var(--text-primary); padding: 8px 20px; border-radius: 20px; font-size: 0.9rem; }

        /* --- Sliders (Related & Blogs) --- */
        .section-heading { font-size: 1.3rem; margin: 40px 0 20px; font-weight: 600; padding-left: 10px; border-left: 4px solid var(--primary-color); }
        .horizontal-slider { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px 20px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .horizontal-slider::-webkit-scrollbar { height: 4px; }
        .horizontal-slider::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 4px; }
        
        .slider-card { min-width: 260px; max-width: 260px; background: var(--surface-color); border-radius: 12px; overflow: hidden; scroll-snap-align: start; box-shadow: var(--card-shadow); border: 1px solid var(--border-color); display: flex; flex-direction: column; transition: transform 0.2s; }
        .slider-card:hover { transform: translateY(-5px); }
        .slider-img { width: 100%; height: 160px; object-fit: cover; background: var(--bg-color); }
        .slider-content { padding: 12px; flex: 1; display: flex; flex-direction: column; }
        .slider-title { font-size: 1rem; font-weight: 600; margin-bottom: 5px; color: var(--text-primary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .slider-meta { font-size: 0.85rem; color: var(--text-secondary); margin-top: auto; }
        .slider-price { color: var(--primary-color); font-weight: 700; font-size: 1.1rem; margin-top: 5px; }

        /* --- Blog Card Specifics --- */
        .blog-card { min-width: 280px; max-width: 280px; }
        .blog-excerpt { font-size: 0.85rem; color: var(--text-secondary); margin-top: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* --- Ad Placeholder --- */
        #ad-slot-320x50 { width: 320px; height: 50px; background: rgba(255,255,255,0.05); border: 1px dashed var(--border-color); margin: 40px auto; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 0.8rem; border-radius: 4px; }

        /* --- Sticky Mobile Buy Bar --- */
        .sticky-buy-bar {
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--surface-color); padding: 12px 15px; 
            border-top: 1px solid var(--border-color); z-index: 900;
            display: flex; gap: 10px; align-items: center;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        }
        .sticky-price-info { flex: 1; display: flex; flex-direction: column; }
        .sticky-price { font-weight: 700; font-size: 1.2rem; color: var(--text-primary); }
        .sticky-timer { font-size: 0.75rem; color: var(--danger-color); display: flex; align-items: center; gap: 4px; }
        @media(min-width: 768px) { .sticky-buy-bar { display: none; } }

        /* --- Modal --- */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { background: var(--surface-color); padding: 25px; border-radius: var(--radius); width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; position: relative; color: var(--text-primary); }
        .modal-title { font-size: 1.2rem; margin-bottom: 15px; font-weight: 600; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 1.5rem; background: none; color: var(--text-secondary); }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-secondary); }
        .form-input, .form-textarea { width: 100%; padding: 10px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 6px; outline: none; }
        .form-textarea { height: 100px; resize: none; }
        .star-rating-input { display: flex; gap: 5px; font-size: 1.5rem; color: var(--border-color); cursor: pointer; }
        .star-rating-input i.active { color: var(--warning-color); }
        .file-upload-ui { border: 2px dashed var(--border-color); padding: 20px; text-align: center; border-radius: 8px; cursor: pointer; margin-top: 5px; }
        .preview-area { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .preview-thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }

        /* --- Toast --- */
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 50px; font-size: 0.9rem; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 2000; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
        .toast.show { opacity: 1; visibility: visible; bottom: 100px; }
        .toast.success { background: var(--success-color); }
        .toast.error { background: var(--danger-color); }

        /* --- Lightbox --- */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; display: none; justify-content: center; align-items: center; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 95%; max-height: 90%; object-fit: contain; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 2rem; background: none; }

        /* --- 404 / Fallback --- */
        .not-found-container { text-align: center; padding: 50px 20px; }
        .not-found-icon { font-size: 4rem; color: var(--text-secondary); margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="page-header container">
        <a href="index.html" class="logo">Discount <span>Hub</span></a>
        <div class="header-actions">
            <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-moon"></i>
            </button>
            <a href="index.html#cart" style="position: relative;">
                <i class="fas fa-shopping-cart" style="font-size: 1.2rem;"></i>
            </a>
        </div>
    </header>

    <div id="main-content" class="container">
        <!-- Loading State -->
        <div id="loading-skeleton" class="product-wrapper">
            <div class="skeleton skeleton-box" style="flex:1;"></div>
            <div style="flex:1; width: 100%;">
                <div class="skeleton skeleton-text" style="height: 40px; width: 80%;"></div>
                <div class="skeleton skeleton-text" style="width: 40%;"></div>
                <div class="skeleton skeleton-text" style="height: 60px; width: 100%; margin-top:20px;"></div>
            </div>
        </div>
    </div>

    <!-- Sticky Buy Bar for Mobile -->
    <div id="sticky-buy-bar" class="sticky-buy-bar" style="display:none;">
        <div class="sticky-price-info">
            <span class="sticky-price" id="mobile-sticky-price">--</span>
            <span class="sticky-timer" id="mobile-sticky-timer" style="display:none;"><i class="fas fa-clock"></i> <span>00:00</span></span>
        </div>
        <button class="btn btn-primary" onclick="buyNow()" style="width: auto; padding: 10px 25px; font-size: 0.9rem;">Buy Now</button>
    </div>

    <!-- Review Modal (Preserved for logic but hidden from UI trigger) -->
    <div id="review-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <h3 class="modal-title">Write a Review</h3>
            <form id="review-form">
                <div class="form-group">
                    <label class="form-label">Rating</label>
                    <div class="star-rating-input" id="star-input">
                        <i class="fas fa-star" data-val="1"></i>
                        <i class="fas fa-star" data-val="2"></i>
                        <i class="fas fa-star" data-val="3"></i>
                        <i class="fas fa-star" data-val="4"></i>
                        <i class="fas fa-star" data-val="5"></i>
                    </div>
                    <input type="hidden" id="rating-val" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Review Title (Optional)</label>
                    <input type="text" id="review-title" class="form-input" placeholder="Sum it up in a few words">
                </div>
                <div class="form-group">
                    <label class="form-label">Review</label>
                    <textarea id="review-text" class="form-textarea" required placeholder="Tell us what you liked or didn't like"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Add Photos (Max 3)</label>
                    <input type="file" id="review-files" multiple accept="image/png, image/jpeg" style="display:none">
                    <div class="file-upload-ui" onclick="document.getElementById('review-files').click()">
                        <i class="fas fa-camera"></i> Tap to upload
                    </div>
                    <div class="preview-area" id="preview-area"></div>
                </div>
                <button type="submit" class="btn btn-primary" id="submit-review-btn">Submit Review</button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"><i class="fas fa-info-circle"></i> <span>Message</span></div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close">&times;</button>
        <img src="" alt="Zoomed Image">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
    import {
      getFirestore, collection, query, where, getDocs, doc, getDoc,
      addDoc, updateDoc, serverTimestamp, orderBy, limit, deleteDoc, startAfter
    } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
    import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDBZLE7xCgKuXmfl1i1ZSwl86Xko7TUalk",
        authDomain: "discounthubadmin.firebaseapp.com",
        projectId: "discounthubadmin",
        storageBucket: "discounthubadmin.firebasestorage.app",
        messagingSenderId: "610110627519",
        appId: "1:610110627519:web:0593a19ddc34fb669ef00a",
        measurementId: "G-NQECVWHTDJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // --- State ---
    let currentProduct = null;
    let currentUser = null;
    let currentOrderId = null; 
    let currentSlug = new URLSearchParams(window.location.search).get('slug');
    let reviewImagesToUpload = [];
    let activeDiscount = 0; // For Timer Logic
    let lastReviewDoc = null; // Pagination

    // --- DOM Elements ---
    const mainContent = document.getElementById('main-content');
    const loadingSkeleton = document.getElementById('loading-skeleton');
    const toast = document.getElementById('toast');
    const modal = document.getElementById('review-modal');
    const lightbox = document.getElementById('lightbox');

    // --- Theme Logic ---
    window.toggleTheme = () => {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        
        const icon = document.querySelector('.theme-toggle i');
        icon.className = next === 'light' ? 'fas fa-sun' : 'fas fa-moon';
    };

    function initTheme() {
        const saved = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', saved);
        document.querySelector('.theme-toggle i').className = saved === 'light' ? 'fas fa-sun' : 'fas fa-moon';
    }

    // --- Initialization ---
    async function init() {
        initTheme();
        if (!currentSlug) {
            renderNotFound();
            return;
        }

        try {
            // Fetch Product
            const q = query(collection(db, "products"), where("slug", "==", currentSlug));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                handleLegacyOr404();
                return;
            }

            const docSnap = querySnapshot.docs[0];
            currentProduct = { id: docSnap.id, ...docSnap.data() };
            
            // Render Page
            renderProduct(currentProduct);
            
            // Load Additional Content (Premium Upgrade)
            loadPremiumReviews();
            loadRelatedProducts(currentProduct.category);
            loadBlogs();

            // Check Auth (Preserved for logic but UI is read-only)
            onAuthStateChanged(auth, async (user) => {
                currentUser = user;
                if(user) {
                    await checkReviewEligibility();
                }
            });

        } catch (error) {
            console.error("Error loading product:", error);
            showToast("Failed to load product", "error");
        }
    }

    // --- Logic: 404 & Legacy Redirects ---
    function handleLegacyOr404() {
        const legacyMap = {
            'airopods-pro': 'https://discounthub.rf.gd/airopods-pro.html',
            'boat-earpods-black-edition': 'https://discounthub.rf.gd/boat-earpods-black-edition.html',
            'combojawellary': 'https://discounthub.rf.gd/combojawellary.html',
            'earrings': 'https://discounthub.rf.gd/earrings.html'
        };

        if (legacyMap[currentSlug]) {
            window.location.replace(legacyMap[currentSlug]);
        } else {
            renderNotFound();
        }
    }

    function renderNotFound() {
        loadingSkeleton.style.display = 'none';
        mainContent.innerHTML = `
            <div class="not-found-container">
                <i class="fas fa-search not-found-icon"></i>
                <h2>Product Not Found</h2>
                <p style="color:var(--text-secondary); margin: 10px 0;">We couldn't find the product you're looking for.</p>
                <a href="index.html" class="btn btn-primary" style="width:200px; margin: 0 auto;">Continue Shopping</a>
            </div>
        `;
    }

    // --- Featured Timer Logic ---
    function initFeaturedTimer(isFeatured) {
        if (!isFeatured) return { html: '', discount: 0 };

        const STORAGE_KEY = `timer_${currentSlug}`;
        const DURATION = 20 * 60 * 1000; // 20 mins
        let endTime = localStorage.getItem(STORAGE_KEY);
        const now = Date.now();

        if (!endTime || now > parseInt(endTime)) {
            // Reset if expired or new
            if (!endTime || (now - parseInt(endTime)) > 24 * 60 * 60 * 1000) { // Reset after 24h
                 endTime = now + DURATION;
                 localStorage.setItem(STORAGE_KEY, endTime);
            } else {
                return { html: '', discount: 0 }; // Expired for the day
            }
        }

        // Calculate Random Discount 3-6%
        const discountKey = `disc_${currentSlug}`;
        let discount = localStorage.getItem(discountKey);
        if(!discount) {
            discount = Math.floor(Math.random() * (6 - 3 + 1)) + 3;
            localStorage.setItem(discountKey, discount);
        }
        activeDiscount = parseInt(discount);

        // Start Timer Interval
        setInterval(() => {
            const left = parseInt(endTime) - Date.now();
            if (left <= 0) {
                document.querySelector('.featured-timer-box').style.display = 'none';
                document.getElementById('mobile-sticky-timer').style.display = 'none';
            } else {
                const m = Math.floor((left % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((left % (1000 * 60)) / 1000);
                const timeStr = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                const el = document.getElementById('timer-display');
                if(el) el.textContent = timeStr;
                const mobEl = document.querySelector('#mobile-sticky-timer span');
                if(mobEl) mobEl.textContent = timeStr;
            }
        }, 1000);

        return {
            discount: activeDiscount,
            html: `
            <div class="featured-timer-box">
                <div class="limited-deal-tag">Flash Deal</div>
                <div class="timer-label">Offer ends in:</div>
                <div class="timer-display" id="timer-display">20:00</div>
            </div>`
        };
    }

    // --- Render Product ---
    function renderProduct(p) {
        // SEO Update
        document.title = `${p.name} | Discount Hub`;
        document.querySelector('meta[property="og:title"]').content = p.name;
        document.querySelector('meta[property="og:description"]').content = p.shortDescription || '';
        if(p.images && p.images.length > 0) document.querySelector('meta[property="og:image"]').content = p.images[0];

        // Featured Timer & Price Logic
        const featuredData = initFeaturedTimer(p.featured);
        const basePrice = Number(p.price);
        const finalPrice = featuredData.discount > 0 
            ? Math.floor(basePrice * (1 - featuredData.discount/100)) 
            : basePrice;
        
        const mrpPrice = Number(p.mrp);
        const discountPercent = p.discountPercent || Math.round(((mrpPrice - finalPrice) / mrpPrice) * 100);
        const stock = p.stock || 0;
        const isStock = stock > 0;

        // Features List
        const featuresHtml = (p.features || []).map(f => `<li>${f}</li>`).join('');
        
        // Specs Table
        let specsHtml = '';
        if (p.specifications) {
            specsHtml = '<table class="specs-table">';
            const entries = Array.isArray(p.specifications) ? p.specifications : Object.entries(p.specifications);
            entries.forEach(([k, v]) => {
                if(typeof k === 'object' && k.key) {
                    specsHtml += `<tr><td>${k.key}</td><td>${k.value}</td></tr>`;
                } else {
                    specsHtml += `<tr><td>${k}</td><td>${v}</td></tr>`;
                }
            });
            specsHtml += '</table>';
        }

        // Images Slideshow
        const images = p.images && p.images.length ? p.images : [p.poster || 'placeholder.jpg'];
        const slidesHtml = images.map(img => `<div class="slide"><img src="${img}" onclick="openLightbox('${img}')"></div>`).join('');
        const dotsHtml = images.map((_, i) => `<div class="dot ${i===0?'active':''}" data-idx="${i}"></div>`).join('');
        const thumbsHtml = images.length > 1 ? images.map((img, i) => 
            `<img src="${img}" class="thumb ${i===0?'active':''}" onclick="goToSlide(${i})">`
        ).join('') : '';

        // Template
        const html = `
            <div class="product-wrapper">
                <!-- Gallery -->
                <div class="gallery-section">
                    <div class="gallery-container" id="gallery-container">
                        <div class="slides-track" id="track">${slidesHtml}</div>
                        ${images.length > 1 ? `<div class="slide-dots" id="dots">${dotsHtml}</div>` : ''}
                    </div>
                    ${images.length > 1 ? `<div class="gallery-nav">${thumbsHtml}</div>` : ''}
                </div>

                <!-- Info -->
                <div class="details-section">
                    <h1 class="product-title">${p.name}</h1>
                    <div class="rating-badge" id="rating-summary">
                        <i class="fas fa-star"></i> <span>--</span> <span class="rating-count">(0 reviews)</span>
                    </div>
                    
                    ${featuredData.html}

                    <div class="price-block">
                        <div style="display:flex; align-items:center;">
                            <span class="current-price" id="display-price">₹${finalPrice.toLocaleString('en-IN')}</span>
                            <span class="mrp">₹${mrpPrice.toLocaleString('en-IN')}</span>
                            <span class="discount-tag">${discountPercent}% OFF</span>
                        </div>
                        ${p.codAvailable ? '<div class="cod-badge"><i class="fas fa-check-circle"></i> Cash on Delivery Available</div>' : ''}
                    </div>

                    <p style="color:var(--text-secondary); margin-bottom:20px;">${p.shortDescription || ''}</p>

                    <div class="action-area">
                        ${isStock ? `
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <label style="font-size:0.9rem; color:var(--text-secondary)">Quantity:</label>
                            <div class="qty-selector">
                                <button class="qty-btn" onclick="updateQty(-1)">-</button>
                                <input type="text" class="qty-input" id="qty-val" value="1" readonly>
                                <button class="qty-btn" onclick="updateQty(1, ${stock})">+</button>
                            </div>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn btn-secondary" onclick="addToCart()">Add to Cart</button>
                            <button class="btn btn-primary" onclick="buyNow()">Buy Now</button>
                        </div>
                        ` : `
                        <button class="btn btn-disabled" disabled>Out of Stock</button>
                        `}
                    </div>

                    <div class="pincode-box">
                        <label style="font-size:0.9rem;">Check Delivery</label>
                        <div class="pincode-input-group">
                            <input type="number" id="pincode" placeholder="Enter Pincode">
                            <button class="check-btn" onclick="checkPincode()">Check</button>
                        </div>
                        <div id="pincode-msg" class="pincode-msg"></div>
                    </div>

                    <div class="info-card">
                        <h3>Key Features</h3>
                        <ul class="feature-list">${featuresHtml}</ul>
                    </div>

                    ${specsHtml ? `
                    <div class="info-card">
                        <h3>Specifications</h3>
                        ${specsHtml}
                    </div>` : ''}
                </div>
            </div>

            <!-- Premium Reviews Section -->
            <div class="info-card" style="margin-top:30px;">
                <div class="review-header">
                    <h3>Customer Reviews</h3>
                    <!-- Write button removed for Read-Only mode -->
                </div>
                <div id="reviews-list" class="premium-reviews-grid">
                    <p style="color:var(--text-secondary);">Loading reviews...</p>
                </div>
                <button id="load-more-reviews" class="load-more-btn" style="display:none" onclick="loadPremiumReviews(true)">See more reviews</button>
            </div>

            <!-- Related Products Slider -->
            <div id="related-products-section" style="display:none">
                <h3 class="section-heading">You might also like</h3>
                <div class="horizontal-slider" id="related-slider"></div>
            </div>

            <!-- Blogs Slider -->
            <div id="blogs-section" style="display:none">
                <h3 class="section-heading">Latest from Blog</h3>
                <div class="horizontal-slider" id="blogs-slider"></div>
            </div>

            <!-- Ad Placeholder -->
            <div id="ad-slot-320x50">Ad Placeholder</div>
        `;

        loadingSkeleton.style.display = 'none';
        mainContent.innerHTML = html;
        
        // Sticky Mobile Bar Logic
        const stickyBar = document.getElementById('sticky-buy-bar');
        if(window.innerWidth < 768 && isStock) {
            stickyBar.style.display = 'flex';
            document.getElementById('mobile-sticky-price').textContent = `₹${finalPrice.toLocaleString('en-IN')}`;
            if(featuredData.discount > 0) document.getElementById('mobile-sticky-timer').style.display = 'flex';
        }

        // Update global var for checkout
        currentProduct.finalPrice = finalPrice;

        if(images.length > 1) initSlideshow(images.length);
    }

    // --- Actions ---
    window.updateQty = (change, max) => {
        const input = document.getElementById('qty-val');
        let val = parseInt(input.value) + change;
        if(val < 1) val = 1;
        if(max && val > max) val = max;
        input.value = val;
    };

    window.addToCart = () => {
        const qty = parseInt(document.getElementById('qty-val').value);
        const price = currentProduct.finalPrice || Number(currentProduct.price); // Use calculated price
        const item = {
            id: currentProduct.id,
            slug: currentSlug,
            name: currentProduct.name,
            price: price,
            image: (currentProduct.images && currentProduct.images[0]) || '',
            quantity: qty
        };
        
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const existing = cart.find(i => i.slug === currentSlug);
        if(existing) existing.quantity += qty;
        else cart.push(item);
        
        localStorage.setItem('cart', JSON.stringify(cart));
        showToast("Added to Cart!", "success");
    };
    window.buyNow = () => {
        const qty = parseInt(document.getElementById('qty-val').value);
        const price = currentProduct.finalPrice || Number(currentProduct.price);
        const codPrice = currentProduct.codAvailable ? price : 0;
        const url = `checkout.html?product=${encodeURIComponent(currentProduct.name)}&price=${price}&codprice=${codPrice}&qty=${qty}&slug=${currentSlug}`;
        window.location.href = url;
    };

    window.checkPincode = () => {
        const pin = document.getElementById('pincode').value;
        const msg = document.getElementById('pincode-msg');
        if(pin.length !== 6) {
            msg.textContent = "Invalid Pincode";
            msg.className = "pincode-msg error";
            return;
        }
        // Mock Logic
        setTimeout(() => {
            const days = Math.floor(Math.random() * 3) + 3;
            msg.innerHTML = `<i class="fas fa-truck"></i> Delivery available in ${days}-${days+1} days. ${currentProduct.codAvailable ? 'COD Available.' : 'Prepaid Only.'}`;
            msg.className = "pincode-msg success";
        }, 500);
    };

    // --- Slideshow Logic ---
    let currentSlide = 0;
    let slideInterval;
    function initSlideshow(count) {
        const track = document.getElementById('track');
        const dots = document.querySelectorAll('.dot');
        const thumbs = document.querySelectorAll('.thumb');
        
        window.goToSlide = (idx) => {
            currentSlide = idx;
            const width = track.clientWidth; 
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
            
            dots.forEach(d => d.classList.remove('active'));
            if(dots[idx]) dots[idx].classList.add('active');
            
            thumbs.forEach(t => t.classList.remove('active'));
            if(thumbs[idx]) thumbs[idx].classList.add('active');
            
            resetInterval();
        };

        const resetInterval = () => {
            clearInterval(slideInterval);
            slideInterval = setInterval(() => {
                let next = currentSlide + 1;
                if(next >= count) next = 0;
                window.goToSlide(next);
            }, 4000);
        };

        let startX = 0;
        track.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        track.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            if (startX - endX > 50) window.goToSlide((currentSlide + 1) % count);
            if (endX - startX > 50) window.goToSlide((currentSlide - 1 + count) % count);
        });

        resetInterval();
    }
// --- Updated Load Reviews Function (Fixes "Not Reviewed" Issue) ---
    window.loadPremiumReviews = async (loadMore = false) => {
        const list = document.getElementById('reviews-list');
        const btn = document.getElementById('load-more-reviews');
        
        try {
            // FIX 1: Changed collection from "product_reviews" to "reviews"
            // FIX 2: Removed 'where("deleted", "==", false)' because the new system deletes docs physically
            let q = query(
                collection(db, "reviews"), 
                where("productSlug", "==", currentSlug),
                orderBy("createdAt", "desc"),
                limit(4)
            );

            if (loadMore && lastReviewDoc) {
                q = query(
                    collection(db, "reviews"), // Fixed collection here too
                    where("productSlug", "==", currentSlug),
                    orderBy("createdAt", "desc"),
                    startAfter(lastReviewDoc),
                    limit(5)
                );
            }

            const snap = await getDocs(q);
            
            if (snap.empty) {
                if(!loadMore) {
                    list.innerHTML = `<p style="color:var(--text-secondary);">No reviews yet.</p>`;
                    // Update summary to 0 if empty
                    const summary = document.getElementById('rating-summary');
                    if(summary) summary.innerHTML = `<i class="fas fa-star"></i> <span>--</span> <span class="rating-count">(0 reviews)</span>`;
                }
                btn.style.display = 'none';
                return;
            }

            lastReviewDoc = snap.docs[snap.docs.length - 1];
            if(snap.docs.length < 4) btn.style.display = 'none';
            else btn.style.display = 'block';

            let html = '';
            let totalStars = 0;

            snap.forEach(doc => {
                const r = doc.data();
                totalStars += r.rating || 0;
                
                // Handle different date formats (Timestamp vs Date)
                let date = 'Recently';
                if(r.createdAt && r.createdAt.toMillis) {
                    date = new Date(r.createdAt.toMillis()).toLocaleDateString();
                }

                let stars = '';
                for(let i=1; i<=5; i++) stars += `<i class="${i<=r.rating ? 'fas' : 'far'} fa-star"></i>`;

                let imgs = '';
                if(r.images && r.images.length) {
                    imgs = `<div class="review-images">
                        ${r.images.map(url => `<img src="${url}" class="review-img" onclick="openLightbox('${url}')">`).join('')}
                    </div>`;
                }
                
                // Video handling (New feature support)
                let videoHtml = '';
                if(r.videoUrl) {
                     videoHtml = `<div style="margin-top:5px;"><a href="${r.videoUrl}" target="_blank" style="color:var(--primary-color); font-size:0.85rem;"><i class="fas fa-video"></i> Watch Video Review</a></div>`;
                }

                html += `
                <div class="review-card">
                    <div class="reviewer-meta">
                        <div class="reviewer-profile">
                            <div class="reviewer-avatar">
                                ${r.userPhoto ? `<img src="${r.userPhoto}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">` : (r.userName ? r.userName.charAt(0).toUpperCase() : 'U')}
                            </div>
                            <div>
                                <div class="reviewer-name">${r.userName || 'Verified User'}</div>
                                <div class="review-stars">${stars}</div>
                            </div>
                        </div>
                        <span class="review-date">${date}</span>
                    </div>
                    ${r.title ? `<div style="font-weight:600; font-size:0.9rem; margin-bottom:4px;">${r.title}</div>` : ''}
                    <div class="review-text">${r.comment || r.text}</div> 
                    ${imgs}
                    ${videoHtml}
                </div>`;
            });

            if(loadMore) list.insertAdjacentHTML('beforeend', html);
            else list.innerHTML = html;
            
            // Update Summary (Visual Avg based on loaded items)
            const summary = document.getElementById('rating-summary');
            if(summary && !loadMore) {
                 const avg = (totalStars / snap.size).toFixed(1);
                 summary.innerHTML = `<i class="fas fa-star"></i> <span>${avg}</span> <span class="rating-count">(${snap.size} reviews)</span>`;
            }

     } catch (e) {
            console.error("Error loading reviews", e);
            // OLD LINE: if(!loadMore && list) list.innerHTML = `<p style="color:var(--text-secondary)">No reviews yet.</p>`;
            
            // NEW DEBUG LINE: Show the actual error on screen
            showToast("Error: " + e.message, "error"); 
            if(!loadMore && list) list.innerHTML = `<p style="color:red">System Error: Check Toast Message</p>`;
        }
    };
    // --- Related Products ---
    async function loadRelatedProducts(category) {
        if(!category) return;
        try {
            const container = document.getElementById('related-products-section');
            const slider = document.getElementById('related-slider');
            
            const q = query(
                collection(db, "products"),
                where("category", "==", category),
                limit(6)
            );
            const snap = await getDocs(q);

            if(snap.empty || (snap.size === 1 && snap.docs[0].data().slug === currentSlug)) return;

            let html = '';
            snap.forEach(doc => {
                const p = doc.data();
                if(p.slug === currentSlug) return;
                const img = (p.images && p.images[0]) || 'placeholder.jpg';
                html += `
                    <a href="product.html?slug=${p.slug}" class="slider-card">
                        <img src="${img}" class="slider-img" loading="lazy">
                        <div class="slider-content">
                            <div class="slider-title">${p.name}</div>
                            <div class="slider-price">₹${Number(p.price).toLocaleString('en-IN')}</div>
                        </div>
                    </a>
                `;
            });

            if(html) {
                slider.innerHTML = html;
                container.style.display = 'block';
            }
        } catch(e) { console.error(e); }
    }

    // --- Blogs ---
    async function loadBlogs() {
        try {
            const container = document.getElementById('blogs-section');
            const slider = document.getElementById('blogs-slider');
            
            const q = query(collection(db, "blogs"), limit(5));
            const snap = await getDocs(q);

            if(snap.empty) return;

            let html = '';
            snap.forEach(doc => {
                const b = doc.data();
                const img = b.image || 'placeholder-blog.jpg';
                html += `
                    <a href="blogs.html?slug=${b.slug}" class="slider-card blog-card">
                        <img src="${img}" class="slider-img" loading="lazy">
                        <div class="slider-content">
                            <div class="slider-title">${b.title}</div>
                            <div class="blog-excerpt">${b.excerpt || ''}</div>
                        </div>
                    </a>
                `;
            });

            if(html) {
                slider.innerHTML = html;
                container.style.display = 'block';
            }
        } catch(e) { console.error(e); }
    }

    // --- Legacy Review Logic (Preserved but UI is hidden) ---
    // Note: checkReviewEligibility is still called in init() for auth users, 
    // but we don't render the CTA button to keep page Read-Only as requested.
    async function checkReviewEligibility() {
        // Logic exists to support admin/future features, but not exposed to UI
    }

    // --- Helpers ---
    function showToast(msg, type="info") {
        toast.querySelector('span').textContent = msg;
        toast.className = `toast show ${type}`;
        setTimeout(() => toast.className = 'toast', 3000);
    }

    window.openLightbox = (src) => {
        const img = lightbox.querySelector('img');
        img.src = src;
        lightbox.classList.add('active');
    };
    
    document.querySelector('.lightbox-close').addEventListener('click', () => lightbox.classList.remove('active'));

    // Start
    init();

</script>
